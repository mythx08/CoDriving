name: CoDrive DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1 : Test et Sécurité du Code
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug - Lister les fichiers
        run: ls -R  # Cela nous permettra de voir si le dossier 'app' est bien là

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx fastapi  # On force l'installation pour le runner

      - name: Exécution des Tests Unitaires
        env:
          TESTING: "true" # On active SQLite pour éviter l'erreur de connexion DB
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest -v -p no:cacheprovider app/test_main.py
  # Job 2 : Sécurité des Conteneurs (Trivy)
  container-security:
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t codriving-app:${{ github.sha }} .

      - name: Scan Trivy (Vérification des failles)
        uses: aquasec/trivy-action@0.20.0  # Utilisation d'une version stable
        with:
          image-ref: 'codriving-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # Job 3 : Validation de l'Infrastructure (Terraform)
  infrastructure-check:
    runs-on: ubuntu-latest
    needs: container-security
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate