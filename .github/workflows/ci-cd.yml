name: CoDrive DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1 : Test et Sécurité du Code
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug - Lister les fichiers
        run: ls -R  # Cela nous permettra de voir si le dossier 'app' est bien là

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx fastapi  # On force l'installation pour le runner

      - name: Exécution des Tests Unitaires
        env:
          TESTING: "true" # On active SQLite pour éviter l'erreur de connexion DB
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest -v -p no:cacheprovider app/test_main.py
  # Job 2 : Sécurité des Conteneurs (Trivy)
  container-security:
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t codriving-app:${{ github.sha }} .

      - name: Installation de Trivy CLI
        run: |
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/dabest.gpg | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Scan de l'image avec Trivy CLI
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed codriving-app:${{ github.sha }}

  # Job 3 : Validation de l'Infrastructure (Terraform)
  infrastructure-check:
    runs-on: ubuntu-latest
    needs: container-security
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate